---
# Post-install provisioning for Omarchy (Arch-based)

# --- QEMU Guest Agent ---

- name: Install qemu-guest-agent
  community.general.pacman:
    name: qemu-guest-agent
    state: present

- name: Enable qemu-guest-agent
  ansible.builtin.systemd:
    name: qemu-guest-agent
    enabled: true
    state: started

# --- Tailscale ---

- name: Check if tailscale is installed
  ansible.builtin.command: which tailscale
  register: tailscale_installed
  changed_when: false
  failed_when: false

- name: Install tailscale
  community.general.pacman:
    name: tailscale
    state: present
  when: tailscale_installed.rc != 0

- name: Enable and start tailscaled
  ansible.builtin.systemd:
    name: tailscaled
    enabled: true
    state: started

- name: Wait for tailscaled socket
  ansible.builtin.wait_for:
    path: /run/tailscale/tailscaled.sock
    timeout: 30

- name: Check tailscale status
  ansible.builtin.command: tailscale status --json
  register: tailscale_status
  changed_when: false
  failed_when: false

- name: Configure tailscale
  ansible.builtin.command: >
    tailscale up
    --authkey={{ tailscale_authkey }}
    --hostname={{ tailscale_hostname }}
  when: tailscale_status.rc != 0 or (tailscale_status.stdout | from_json).BackendState != "Running"
  changed_when: true

# --- SSH hardening ---

- name: Enable sshd
  ansible.builtin.systemd:
    name: sshd
    enabled: true
    state: started
