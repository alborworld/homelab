---
# OpenClaw AI Assistant for Ubuntu 24.04 LXC
# Based on: https://merox.dev/blog/moltbot-proxmox-deployment/

# --- Install Node.js 22.x ---

- name: Install prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - iptables
      - git
      - build-essential
      - python3
    state: present
    update_cache: true

- name: Download NodeSource setup script
  ansible.builtin.get_url:
    url: "https://deb.nodesource.com/setup_{{ nodejs_major_version }}.x"
    dest: /tmp/nodesource-setup.sh
    mode: "0755"

- name: Run NodeSource setup script
  ansible.builtin.command: /tmp/nodesource-setup.sh
  args:
    creates: /etc/apt/sources.list.d/nodesource.list
  changed_when: true

- name: Install Node.js
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: true

- name: Verify Node.js version
  ansible.builtin.command: node -v
  register: node_version
  changed_when: false

- name: Assert Node.js 22+
  ansible.builtin.assert:
    that: "node_version.stdout is version('v22', '>=')"
    fail_msg: "Node.js 22+ required, got {{ node_version.stdout }}"

- name: Clean up setup script
  ansible.builtin.file:
    path: /tmp/nodesource-setup.sh
    state: absent

# --- Create service user ---

- name: Create openclaw user
  ansible.builtin.user:
    name: "{{ openclaw_user }}"
    system: true
    shell: /bin/bash
    home: "{{ openclaw_home }}"
    create_home: true

- name: Get openclaw user UID
  ansible.builtin.getent:
    database: passwd
    key: "{{ openclaw_user }}"

- name: Set openclaw UID fact
  ansible.builtin.set_fact:
    openclaw_uid: "{{ getent_passwd[openclaw_user][1] }}"

- name: Enable loginctl linger for openclaw user
  ansible.builtin.command: loginctl enable-linger {{ openclaw_user }}
  args:
    creates: /var/lib/systemd/linger/{{ openclaw_user }}

# --- Install OpenClaw ---

- name: Check if openclaw is installed
  ansible.builtin.command: which openclaw
  register: openclaw_installed
  changed_when: false
  failed_when: false

- name: Install openclaw via official CLI installer
  when: openclaw_installed.rc != 0
  become: true
  become_user: "{{ openclaw_user }}"
  ansible.builtin.shell: |
    curl -fsSL https://openclaw.ai/install-cli.sh | bash
  args:
    creates: "{{ openclaw_home }}/.openclaw/bin/openclaw"

- name: Ensure openclaw bin is in PATH system-wide
  ansible.builtin.copy:
    dest: /etc/profile.d/openclaw.sh
    content: |
      export PATH="{{ openclaw_home }}/.openclaw/bin:$PATH"
    mode: "0644"

# --- Configure model priority ---

- name: Deploy model config script
  ansible.builtin.template:
    src: configure-models.py.j2
    dest: "{{ openclaw_home }}/bin/configure-models.py"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: "0755"

- name: Configure model priority in openclaw.json
  become: true
  become_user: "{{ openclaw_user }}"
  ansible.builtin.command: python3 {{ openclaw_home }}/bin/configure-models.py
  register: configure_models
  changed_when: "'changed' in configure_models.stdout"
  notify: Restart openclaw

# --- Configure systemd service ---

- name: Install openclaw systemd service
  ansible.builtin.template:
    src: openclaw.service.j2
    dest: /etc/systemd/system/openclaw.service
    mode: "0644"
  notify: Restart openclaw

# --- Security hardening (iptables) ---

- name: Install iptables-persistent
  ansible.builtin.apt:
    name: iptables-persistent
    state: present
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Configure firewall rules
  ansible.builtin.template:
    src: iptables-rules.j2
    dest: /etc/iptables/rules.v4
    mode: "0644"
  notify: Restore iptables

# --- Tailscale ---

- name: Check if tailscale is installed
  ansible.builtin.command: which tailscale
  register: tailscale_installed
  changed_when: false
  failed_when: false

- name: Install tailscale
  when: tailscale_installed.rc != 0
  block:
    - name: Download tailscale install script
      ansible.builtin.get_url:
        url: https://tailscale.com/install.sh
        dest: /tmp/tailscale-install.sh
        mode: "0755"

    - name: Run tailscale install script
      ansible.builtin.command: /tmp/tailscale-install.sh
      changed_when: true

    - name: Clean up install script
      ansible.builtin.file:
        path: /tmp/tailscale-install.sh
        state: absent

- name: Enable and start tailscaled
  ansible.builtin.systemd:
    name: tailscaled
    enabled: true
    state: started

- name: Wait for tailscaled socket
  ansible.builtin.wait_for:
    path: /run/tailscale/tailscaled.sock
    timeout: 30

- name: Check tailscale status
  ansible.builtin.command: tailscale status --json
  register: tailscale_status
  changed_when: false
  failed_when: false

- name: Configure tailscale
  ansible.builtin.command: >
    tailscale up
    --authkey={{ tailscale_authkey }}
    --hostname={{ tailscale_hostname }}
    {% if not tailscale_accept_dns %}--accept-dns=false{% endif %}
  when: tailscale_status.rc != 0 or (tailscale_status.stdout | from_json).BackendState != "Running"
  changed_when: true

# --- Whisper audio transcription ---

- name: Install ffmpeg for audio processing
  ansible.builtin.apt:
    name: ffmpeg
    state: present

- name: Install python3-venv
  ansible.builtin.apt:
    name: python3-venv
    state: present

- name: Create whisper virtualenv with faster-whisper
  become: true
  become_user: "{{ openclaw_user }}"
  ansible.builtin.pip:
    name: faster-whisper
    virtualenv: "{{ whisper_venv_path }}"
    virtualenv_command: python3 -m venv
    state: present

- name: Create bin directory for openclaw user
  ansible.builtin.file:
    path: "{{ openclaw_home }}/bin"
    state: directory
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: "0755"

- name: Deploy transcribe_ogg.py script
  ansible.builtin.template:
    src: transcribe_ogg.py.j2
    dest: "{{ openclaw_home }}/bin/transcribe_ogg.py"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: "0755"

- name: Create whisper wrapper script (uses venv python)
  ansible.builtin.copy:
    dest: "{{ openclaw_home }}/bin/transcribe"
    content: |
      #!/bin/bash
      exec {{ whisper_venv_path }}/bin/python {{ openclaw_home }}/bin/transcribe_ogg.py "$@"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: "0755"

- name: Deploy whisper config script
  ansible.builtin.template:
    src: configure-whisper.py.j2
    dest: "{{ openclaw_home }}/bin/configure-whisper.py"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: "0755"

- name: Configure audio transcription in openclaw.json
  become: true
  become_user: "{{ openclaw_user }}"
  ansible.builtin.command: python3 {{ openclaw_home }}/bin/configure-whisper.py
  register: configure_whisper
  changed_when: "'changed' in configure_whisper.stdout"
  notify: Restart openclaw

# --- TTS (ElevenLabs) ---

- name: Deploy TTS config script
  ansible.builtin.template:
    src: configure-tts.py.j2
    dest: "{{ openclaw_home }}/bin/configure-tts.py"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: "0755"

- name: Configure Edge TTS in openclaw.json
  become: true
  become_user: "{{ openclaw_user }}"
  ansible.builtin.command: python3 {{ openclaw_home }}/bin/configure-tts.py
  register: configure_tts
  changed_when: "'changed' in configure_tts.stdout"
  notify: Restart openclaw

# --- Post-install notice ---
# Onboarding is interactive and must be run manually:
#   ssh openclaw
#   sudo -u openclaw openclaw onboard
#
# The wizard will prompt for:
#   1. Security acknowledgment
#   2. Mode selection (QuickStart)
#   3. Model provider → Ollama → http://ollama:11434
#   4. Channel setup (Telegram, Slack, etc.)
#   5. Skills configuration
#
# After onboarding, enable the service:
#   systemctl enable --now openclaw
#
# Whisper transcription:
#   Test with: sudo -u openclaw /home/openclaw/bin/transcribe /path/to/audio.ogg
#   The transcribe wrapper uses the venv at {{ whisper_venv_path }}
