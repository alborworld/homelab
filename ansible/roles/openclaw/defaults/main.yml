---
# OpenClaw Role Defaults

# Tailscale
tailscale_hostname: "openclaw"
tailscale_accept_dns: false

# Node.js
nodejs_major_version: 22

# OpenClaw
openclaw_user: "openclaw"
openclaw_home: "/home/openclaw"
openclaw_ollama_host: "http://ollama:11434"
openclaw_dashboard_port: 1455
openclaw_primary_model: "openai-codex/gpt-5.3-codex"
openclaw_fallback_model: "custom-ollama-home-alborworld-com/llama3.1:8b"

# Whisper (audio transcription)
whisper_venv_path: "{{ openclaw_home }}/.venvs/whisper"
whisper_model_size: "small"
whisper_compute_type: "int8"
whisper_language: ""  # empty = auto-detect, set to "en" for English-only

# TTS (ElevenLabs)
tts_provider: "elevenlabs"
tts_auto: "inbound"  # auto-TTS on inbound voice messages
elevenlabs_voice_id: "8JVbfL6oEdmuxKn5DK2C"
elevenlabs_model_id: "eleven_multilingual_v2"
