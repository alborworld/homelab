---
- name: Restart WireGuard
  ansible.builtin.shell: |
    wg-quick down wg0 || true
    wg-quick up wg0
    WG_PRIO=$(ip rule list | grep suppress_prefixlength | head -1 | awk -F: '{print $1}')
    ip rule add fwmark 0x80000/0xff0000 lookup main priority $((WG_PRIO - 1)) 2>/dev/null || true
    ip rule add to 100.64.0.0/10 lookup 52 priority 5200 2>/dev/null || true
    # Note: do NOT add default to table 52 (causes routing recursion with Tailscale rule 5270)
  changed_when: true

- name: Restart nftables
  ansible.builtin.service:
    name: nftables
    state: restarted

- name: Restart Tailscale
  ansible.builtin.service:
    name: tailscale
    state: restarted

- name: Restart crond
  ansible.builtin.service:
    name: crond
    state: restarted
